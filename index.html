<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高鐵秘書系統 v4</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 12px; max-width: 400px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #F45F00; text-align: center; margin-bottom: 20px; border-bottom: 2px solid #F45F00; padding-bottom: 10px; }
        .field { margin-top: 12px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .highlight input { color: #F45F00; font-weight: bold; border-color: #F45F00; }
        button#btnShare { width: 100%; padding: 15px; background: #F45F00; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🚄 訂票資訊確認 (行事曆版)</h2>
        <div class="field"><label>日期</label><input type="text" id="date"></div>
        <div style="display:flex; gap:10px;">
            <div class="field" style="flex:1;"><label>起點</label><input type="text" id="sl"></div>
            <div class="field" style="flex:1;"><label>終點</label><input type="text" id="dl"></div>
        </div>
        <div style="display:flex; gap:10px;">
            <div class="field" style="flex:1;"><label>出發</label><input type="text" id="st"></div>
            <div class="field" style="flex:1;"><label>抵達</label><input type="text" id="et"></div>
        </div>
        <div style="display:flex; gap:10px;">
            <div class="field" style="flex:1;"><label>車次</label><input type="text" id="tn"></div>
            <div class="field" style="flex:1;"><label>座位</label><input type="text" id="seat"></div>
        </div>
        <div class="field highlight"><label>訂位代號</label><input type="text" id="pnr"></div>
        <div class="field highlight"><label>驗證碼</label><input type="text" id="id4"></div>
        <button id="btnShare">確認並分享給主管</button>
    </div>

    <script>
        liff.init({ liffId: "2009593705-UXqntLN7" }).then(() => {
            if (!liff.isLoggedIn()) { liff.login(); }
            const p = new URLSearchParams(window.location.search);
            document.getElementById('date').value = decodeURIComponent(p.get('date') || '');
            document.getElementById('sl').value = decodeURIComponent(p.get('sl') || '');
            document.getElementById('dl').value = decodeURIComponent(p.get('dl') || '');
            document.getElementById('st').value = p.get('st') || '';
            document.getElementById('et').value = p.get('et') || '';
            document.getElementById('tn').value = p.get('tn') || '';
            document.getElementById('seat').value = decodeURIComponent(p.get('seat') || '');
            document.getElementById('pnr').value = p.get('pnr') || '';
            document.getElementById('id4').value = p.get('id4') || '0114';
        });

        document.getElementById('btnShare').onclick = () => {
            const d = {
                date: document.getElementById('date').value, // 格式: 2026/03/11
                sl: document.getElementById('sl').value,
                dl: document.getElementById('dl').value,
                st: document.getElementById('st').value,
                et: document.getElementById('et').value,
                tn: document.getElementById('tn').value,
                seat: document.getElementById('seat').value,
                pnr: document.getElementById('pnr').value,
                id4: document.getElementById('id4').value
            };

            // 格式化 Google 行事曆日期 (YYYYMMDDTHHMMSSZ)
            const cleanDate = d.date.replace(/\//g, '');
            const startTime = cleanDate + 'T' + d.st.replace(':', '') + '00';
            const endTime = cleanDate + 'T' + d.et.replace(':', '') + '00';
            
            const gCalUrl = "https://www.google.com/calendar/render?action=TEMPLATE" +
                "&text=" + encodeURIComponent("🚄 高鐵: " + d.sl + "→" + d.dl) +
                "&dates=" + startTime + "/" + endTime +
                "&details=" + encodeURIComponent("車次：" + d.tn + "\n座位：" + d.seat + "\n訂位代號：" + d.pnr + "\n驗證碼：" + d.id4) +
                "&location=" + encodeURIComponent(d.sl + "高鐵站") +
                "&trp=true";

            liff.shareTargetPicker([{
                "type": "flex",
                "altText": "🚄 高鐵行程 取票通知 (" + d.sl + "→" + d.dl + ")",
                "contents": {
                    "type": "bubble",
                    "header": { "type": "box", "layout": "vertical", "contents": [{"type": "text", "text": "🚄 高鐵行程 取票通知", "color": "#ffffff", "weight": "bold"}], "backgroundColor": "#F45F00" },
                    "body": { "type": "box", "layout": "vertical", "spacing": "sm", "contents": [
                        { "type": "text", "text": d.date, "weight": "bold", "color": "#F45F00" },
                        { "type": "text", "text": d.sl + " → " + d.dl, "weight": "bold", "size": "xl" },
                        { "type": "text", "text": "時間：" + d.st + " - " + d.et, "size": "sm" },
                        { "type": "text", "text": "車次：" + d.tn + " / 座位：" + d.seat, "size": "sm" },
                        { "type": "separator", "margin": "md" },
                        { "type": "text", "text": "訂位代號：" + d.pnr, "color": "#F45F00", "weight": "bold", "size": "lg" },
                        { "type": "text", "text": "驗證碼：" + d.id4, "color": "#F45F00", "weight": "bold", "size": "lg" }
                    ]},
                    "footer": { "type": "box", "layout": "vertical", "spacing": "md", "contents": [
                        { "type": "button", "style": "primary", "color": "#06C755", "action": { "type": "clipboard", "label": "點擊複製【訂位代號】", "clipboardText": d.pnr } },
                        { "type": "button", "style": "primary", "color": "#06C755", "action": { "type": "clipboard", "label": "點擊複製【驗證碼】", "clipboardText": d.id4 } },
                        { "type": "button", "style": "secondary", "color": "#4285F4", "action": { "type": "uri", "label": "📅 加入 Google 行事曆", "uri": gCalUrl } }
                    ]}
                }
            }]).then(res => { if(res) liff.closeWindow(); });
        };
    </script>
</body>
</html>
