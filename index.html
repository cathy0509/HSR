<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高鐵秘書確認</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f8f9fa; }
        .item { margin-bottom: 10px; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #F45F00; color: white; border: none; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <h3>🚄 確認訂票資訊</h3>
    <div class="item"><label>行程</label><input type="text" id="route"></div>
    <div class="item"><label>時間</label><input type="text" id="time"></div>
    <div class="item"><label>車次</label><input type="text" id="trainNo"></div>
    <div class="item"><label>座位</label><input type="text" id="seat"></div>
    <hr>
    <div class="item"><label>訂位代號</label><input type="text" id="pnr"></div>
    <div class="item"><label>驗證碼</label><input type="text" id="id4" value="0114"></div>
    <button id="btn">確認分享給主管</button>

    <script>
        liff.init({ liffId: "你的_LIFF_ID" }).then(() => {
            if (!liff.isLoggedIn()) { liff.login(); }
            const p = new URLSearchParams(window.location.search);
            // 自動填入 Python 傳過來的資料
            document.getElementById('route').value = (p.get('sl') || '') + "-" + (p.get('dl') || '');
            document.getElementById('time').value = (p.get('st') || '') + "-" + (p.get('et') || '');
            document.getElementById('trainNo').value = p.get('trainNo') || '';
            document.getElementById('seat').value = p.get('seat') || '';
            document.getElementById('pnr').value = p.get('pnr') || '';
            document.getElementById('id4').value = p.get('id4') || '0114';
        });

        document.getElementById('btn').onclick = () => {
            const pnr = document.getElementById('pnr').value;
            const id4 = document.getElementById('id4').value;
            liff.shareTargetPicker([{
                "type": "flex", "altText": "高鐵行程資訊",
                "contents": {
                    "type": "bubble",
                    "header": { "type": "box", "layout": "vertical", "contents": [{"type": "text", "text": "🚄 高鐵行程通知", "color": "#ffffff"}], "backgroundColor": "#F45F00" },
                    "body": {
                        "type": "box", "layout": "vertical", "contents": [
                            { "type": "text", "text": document.getElementById('route').value, "weight": "bold", "size": "lg" },
                            { "type": "text", "text": "時間：" + document.getElementById('time').value },
                            { "type": "text", "text": "車次：" + document.getElementById('trainNo').value + " / 座位：" + document.getElementById('seat').value },
                            { "type": "separator", "margin": "md" },
                            { "type": "text", "text": "訂位代號：" + pnr, "color": "#F45F00", "weight": "bold" },
                            { "type": "text", "text": "驗證碼：" + id4, "color": "#F45F00", "weight": "bold" }
                        ]
                    },
                    "footer": {
                        "type": "box", "layout": "vertical", "contents": [
                            { "type": "button", "action": { "type": "clipboard", "label": "複製代號", "clipboardText": pnr }, "style": "primary", "color": "#F45F00" },
                            { "type": "button", "action": { "type": "clipboard", "label": "複製驗證碼", "clipboardText": id4 } }
                        ]
                    }
                }
            }]).then(() => liff.closeWindow());
        };
    </script>
</body>
</html>
