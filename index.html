<div class="section-title">行程與時間</div>
<div class="field"><label>乘車日期</label><input type="text" id="date"></div>
<div class="row">
    <div class="field"><label>起點站</label><input type="text" id="sl"></div>
    <div class="field"><label>終點站</label><input type="text" id="dl"></div>
</div>

<script>
    liff.init({ liffId: "2009593705-UXqntLN7" }).then(() => {
        if (!liff.isLoggedIn()) { liff.login(); }
        const p = new URLSearchParams(window.location.search);
        
        // 填入日期
        document.getElementById('date').value = p.get('date') || '';
        document.getElementById('sl').value = p.get('sl') || '';
        document.getElementById('dl').value = p.get('dl') || '';
        // ... 其他自動填入邏輯保持不變 ...
    });

    document.getElementById('btnShare').addEventListener('click', () => {
        const d = {
            date: document.getElementById('date').value,
            pnr: document.getElementById('pnr').value,
            id4: document.getElementById('id4').value,
            train: document.getElementById('trainNo').value,
            seat: document.getElementById('seat').value,
            route: document.getElementById('sl').value + " → " + document.getElementById('dl').value,
            time: document.getElementById('st').value + " - " + document.getElementById('et').value
        };

        liff.shareTargetPicker([
            {
                "type": "flex",
                "altText": "🚄 高鐵行程通知 (" + d.date + " " + d.route + ")",
                "contents": {
                    "type": "bubble",
                    "header": {
                        "type": "box", "layout": "vertical",
                        "contents": [{"type": "text", "text": "🚄 高鐵行程通知", "color": "#ffffff", "weight": "bold"}],
                        "backgroundColor": "#F45F00"
                    },
                    "body": {
                        "type": "box", "layout": "vertical", "spacing": "md",
                        "contents": [
                            { "type": "text", "text": d.date, "weight": "bold", "size": "md", "color": "#F45F00" },
                            { "type": "text", "text": d.route, "weight": "bold", "size": "xl" },
                            { "type": "text", "text": "時間：" + d.time, "size": "sm" },
                            { "type": "text", "text": "車次：" + d.train + " / 座位：" + d.seat, "size": "sm" },
                            { "type": "separator", "margin": "lg" },
                            { "type": "text", "text": "訂位代號：" + d.pnr, "weight": "bold", "size": "lg", "color": "#F45F00" },
                            { "type": "text", "text": "驗證碼：" + d.id4, "weight": "bold", "size": "lg", "color": "#F45F00" }
                        ]
                    },
                    "footer": {
                        "type": "box", "layout": "vertical", "spacing": "sm",
                        "contents": [
                            { "type": "button", "style": "primary", "color": "#F45F00", "action": { "type": "clipboard", "label": "複製訂位代號", "clipboardText": d.pnr } },
                            { "type": "button", "style": "secondary", "action": { "type": "clipboard", "label": "複製驗證碼", "clipboardText": d.id4 } }
                        ]
                    }
                }
            }
        ]).then(() => liff.closeWindow());
    });
</script>
