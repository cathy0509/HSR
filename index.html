<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資訊確認 v3</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 12px; max-width: 400px; margin: auto; }
        .field { margin-top: 10px; }
        label { display: block; font-size: 12px; color: #888; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #06C755; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#F45F00; text-align:center;">🚄 訂票資訊確認 (v3)</h2>
        <div class="field"><label>日期</label><input type="text" id="date"></div>
        <div style="display:flex; gap:10px;">
            <div class="field" style="flex:1;"><label>起點</label><input type="text" id="sl"></div>
            <div class="field" style="flex:1;"><label>終點</label><input type="text" id="dl"></div>
        </div>
        <div style="display:flex; gap:10px;">
            <div class="field" style="flex:1;"><label>出發</label><input type="text" id="st"></div>
            <div class="field" style="flex:1;"><label>抵達</label><input type="text" id="et"></div>
        </div>
        <div style="display:flex; gap:10px;">
            <div class="field" style="flex:1;"><label>車次</label><input type="text" id="tn"></div>
            <div class="field" style="flex:1;"><label>座位</label><input type="text" id="seat"></div>
        </div>
        <div class="field"><label>訂位代號</label><input type="text" id="pnr" style="color:#F45F00; font-weight:bold;"></div>
        <div class="field"><label>驗證碼</label><input type="text" id="id4"></div>
        <button id="btnShare">確認並分享給主管</button>
    </div>

    <script>
        // 暴力解析網址參數函數
        function getParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name) || '';
        }

        liff.init({ liffId: "2009593705-UXqntLN7" }).then(() => {
            if (!liff.isLoggedIn()) { 
                liff.login(); 
            } else {
                console.log("開始填充資料...");
                // 讀取並填入，增加 decodeURIComponent 確保中文不亂碼
                document.getElementById('date').value = decodeURIComponent(getParam('date'));
                document.getElementById('sl').value = decodeURIComponent(getParam('sl'));
                document.getElementById('dl').value = decodeURIComponent(getParam('dl'));
                document.getElementById('st').value = getParam('st');
                document.getElementById('et').value = getParam('et');
                document.getElementById('tn').value = getParam('tn');
                document.getElementById('seat').value = decodeURIComponent(getParam('seat'));
                document.getElementById('pnr').value = getParam('pnr');
                document.getElementById('id4').value = getParam('id4') || '0114';
            }
        }).catch(err => console.error("LIFF 初始化失敗", err));

        document.getElementById('btnShare').onclick = () => {
            const d = {
                date: document.getElementById('date').value,
                pnr: document.getElementById('pnr').value,
                id4: document.getElementById('id4').value,
                tn: document.getElementById('tn').value,
                seat: document.getElementById('seat').value,
                route: document.getElementById('sl').value + " → " + document.getElementById('dl').value,
                time: document.getElementById('st').value + " - " + document.getElementById('et').value
            };

            liff.shareTargetPicker([{
                "type": "flex", "altText": "🚄 高鐵行程 取票通知",
                "contents": {
                    "type": "bubble",
                    "header": { "type": "box", "layout": "vertical", "contents": [{"type": "text", "text": "🚄 高鐵行程 取票通知", "color": "#ffffff", "weight": "bold"}], "backgroundColor": "#F45F00" },
                    "body": { "type": "box", "layout": "vertical", "spacing": "sm", "contents": [
                        { "type": "text", "text": d.date, "weight": "bold", "color": "#F45F00" },
                        { "type": "text", "text": d.route, "weight": "bold", "size": "xl" },
                        { "type": "text", "text": "時間：" + d.time, "size": "sm" },
                        { "type": "text", "text": "車次：" + d.tn + " / 座位：" + d.seat, "size": "sm" },
                        { "type": "separator", "margin": "md" },
                        { "type": "text", "text": "訂位代號：" + d.pnr, "color": "#F45F00", "weight": "bold", "size": "lg" },
                        { "type": "text", "text": "驗證碼：" + d.id4, "color": "#F45F00", "weight": "bold", "size": "lg" }
                    ]},
                    "footer": { "type": "box", "layout": "vertical", "spacing": "sm", "contents": [
                        { "type": "button", "style": "primary", "color": "#06C755", "action": { "type": "clipboard", "label": "點擊複製【訂位代號】", "clipboardText": d.pnr } },
                        { "type": "button", "style": "primary", "color": "#06C755", "action": { "type": "clipboard", "label": "點擊複製【驗證碼】", "clipboardText": d.id4 } }
                    ]}
                }
            }]).then(res => { if(res) liff.closeWindow(); }).catch(() => alert("分享失敗，請檢查權限"));
        };
    </script>
</body>
</html>
