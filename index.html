<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高鐵資訊確認 v5</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 12px; max-width: 400px; margin: auto; }
        .section { border-top: 1px solid #eee; margin-top: 15px; padding-top: 10px; }
        label { font-size: 12px; color: #888; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 5px; }
        button { width: 100%; padding: 15px; background: #06C755; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#F45F00; text-align:center;">🚄 資訊確認</h2>
        <div class="section">
            <label>【去程資訊】</label>
            <input type="text" id="route1">
            <input type="text" id="time1">
            <input type="text" id="info1">
        </div>
        <div id="returnSection" class="section" style="display:none;">
            <label>【回程資訊】</label>
            <input type="text" id="route2">
            <input type="text" id="time2">
            <input type="text" id="info2">
        </div>
        <div class="section">
            <label>訂位代號</label>
            <input type="text" id="pnr" style="color:#F45F00; font-weight:bold;">
        </div>
        <button id="btnShare">確認並分享給主管</button>
    </div>

    <script>
        let isReturn = false;
        liff.init({ liffId: "2009593705-UXqntLN7" }).then(() => {
            const p = new URLSearchParams(window.location.search);
            // 填充去程
            document.getElementById('route1').value = decodeURIComponent(p.get('sl1') || '') + " → " + decodeURIComponent(p.get('dl1') || '');
            document.getElementById('time1').value = (p.get('st1') || '') + " - " + (p.get('et1') || '');
            document.getElementById('info1').value = "車次：" + (p.get('tn1') || '') + " / 座位：" + decodeURIComponent(p.get('seat1') || '');
            document.getElementById('pnr').value = p.get('pnr') || '';

            // 檢查回程
            if (p.get('sl2')) {
                isReturn = true;
                document.getElementById('returnSection').style.display = 'block';
                document.getElementById('route2').value = decodeURIComponent(p.get('sl2') || '') + " → " + decodeURIComponent(p.get('dl2') || '');
                document.getElementById('time2').value = (p.get('st2') || '') + " - " + (p.get('et2') || '');
                document.getElementById('info2').value = "車次：" + (p.get('tn2') || '') + " / 座位：" + decodeURIComponent(p.get('seat2') || '');
            }
        });

        document.getElementById('btnShare').onclick = () => {
            const pnr = document.getElementById('pnr').value;
            // 建立 Flex Message 內容 (略過細節以簡化)
            // ...這裡會根據 isReturn 動態生成包含兩行程的卡片...
            liff.shareTargetPicker([/* Flex Message JSON */]).then(() => liff.closeWindow());
        };
    </script>
</body>
</html>
